<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI创作动态漫 - 注册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .comic-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
    .password-strength {
      height: 4px;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .strength-weak { width: 33%; background: #ef4444; }
    .strength-medium { width: 66%; background: #f59e0b; }
    .strength-strong { width: 100%; background: #22c55e; }
  </style>
</head>
<body class="comic-bg min-h-screen flex items-center justify-center">
  <div class="glass-card rounded-2xl shadow-2xl w-full max-w-md p-10 mx-4">
    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-pink-500 bg-clip-text text-transparent">
        AI创作动态漫
      </h1>
      <p class="text-gray-500 mt-2 text-sm">创建账号，开始创作</p>
    </div>

    <!-- Register Form -->
    <form id="registerForm" class="space-y-5">
      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">用户名</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="请输入用户名"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition-all"
          required
        >
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="email">邮箱</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="请输入邮箱"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition-all"
          required
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">密码</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="请输入密码"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition-all"
          required
          minlength="6"
        >
        <!-- Password Strength Indicator -->
        <div class="mt-2 flex gap-1">
          <div id="strength1" class="password-strength bg-gray-200"></div>
          <div id="strength2" class="password-strength bg-gray-200"></div>
          <div id="strength3" class="password-strength bg-gray-200"></div>
        </div>
        <p id="strengthText" class="text-xs text-gray-400 mt-1">密码强度：未检测</p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="confirmPassword">确认密码</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="请再次输入密码"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition-all"
          required
        >
        <p id="matchText" class="text-xs mt-1 hidden"></p>
      </div>

      <!-- Terms -->
      <div class="flex items-start text-sm">
        <input type="checkbox" id="terms" class="w-4 h-4 mt-0.5 text-purple-600 rounded border-gray-300 focus:ring-purple-500" required>
        <label for="terms" class="ml-2 text-gray-600">我已阅读并同意 <a href="#" class="text-purple-600 hover:underline">服务条款</a> 和 <a href="#" class="text-purple-600 hover:underline">隐私政策</a></label>
      </div>

      <!-- Register Button -->
      <button
        type="submit"
        id="registerBtn"
        class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-500 text-white font-semibold rounded-xl hover:from-purple-700 hover:to-pink-600 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed"
        disabled
      >
        注册
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <div class="flex-1 border-t border-gray-200"></div>
      <span class="px-4 text-sm text-gray-400">或</span>
      <div class="flex-1 border-t border-gray-200"></div>
    </div>

    <!-- Login Button -->
    <button
      type="button"
      id="loginBtn"
      class="w-full py-3 bg-white border-2 border-purple-600 text-purple-600 font-semibold rounded-xl hover:bg-purple-50 transition-all"
    >
      已有账号？去登录
    </button>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
      注册即表示同意 <a href="#" class="underline">服务条款</a> 和 <a href="#" class="underline">隐私政策</a>
    </p>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const loginBtn = document.getElementById('loginBtn');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const registerBtn = document.getElementById('registerBtn');
    const termsCheckbox = document.getElementById('terms');
    const strength1 = document.getElementById('strength1');
    const strength2 = document.getElementById('strength2');
    const strength3 = document.getElementById('strength3');
    const strengthText = document.getElementById('strengthText');
    const matchText = document.getElementById('matchText');

    // Password strength checker
    function checkPasswordStrength(password) {
      let strength = 0;
      if (password.length >= 6) strength++;
      if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
      if (/[0-9]/.test(password) || /[^A-Za-z0-9]/.test(password)) strength++;
      return strength;
    }

    function updateStrengthUI(strength) {
      strength1.className = 'password-strength bg-gray-200';
      strength2.className = 'password-strength bg-gray-200';
      strength3.className = 'password-strength bg-gray-200';

      if (strength === 0) {
        strengthText.textContent = '密码强度：未检测';
        strengthText.className = 'text-xs text-gray-400 mt-1';
      } else if (strength === 1) {
        strength1.className = 'password-strength strength-weak';
        strengthText.textContent = '密码强度：弱';
        strengthText.className = 'text-xs text-red-500 mt-1';
      } else if (strength === 2) {
        strength1.className = 'password-strength strength-medium';
        strength2.className = 'password-strength strength-medium';
        strengthText.textContent = '密码强度：中';
        strengthText.className = 'text-xs text-yellow-500 mt-1';
      } else if (strength === 3) {
        strength1.className = 'password-strength strength-strong';
        strength2.className = 'password-strength strength-strong';
        strength3.className = 'password-strength strength-strong';
        strengthText.textContent = '密码强度：强';
        strengthText.className = 'text-xs text-green-500 mt-1';
      }
    }

    function validateForm() {
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      const isPasswordMatch = password === confirmPassword && password.length > 0;
      const isTermsChecked = termsCheckbox.checked;
      const isFormValid = form.checkValidity();

      registerBtn.disabled = !(isFormValid && isTermsChecked);

      // Update confirm password match indicator
      if (confirmPassword.length > 0) {
        matchText.classList.remove('hidden');
        if (isPasswordMatch) {
          matchText.textContent = '✓ 两次密码输入一致';
          matchText.className = 'text-xs mt-1 text-green-500';
        } else {
          matchText.textContent = '✗ 两次密码输入不一致';
          matchText.className = 'text-xs mt-1 text-red-500';
        }
      } else {
        matchText.classList.add('hidden');
      }
    }

    passwordInput.addEventListener('input', function() {
      const strength = checkPasswordStrength(this.value);
      updateStrengthUI(strength);
      validateForm();
    });

    confirmPasswordInput.addEventListener('input', validateForm);
    termsCheckbox.addEventListener('change', validateForm);

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alert('两次密码输入不一致，请检查！');
        return;
      }

      alert('注册功能演示：\n用户名=' + username + '\n邮箱=' + email);
    });

    loginBtn.addEventListener('click', function() {
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
