<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI创作动态漫 - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .comic-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="comic-bg min-h-screen flex items-center justify-center">
  <div class="glass-card rounded-2xl shadow-2xl w-full max-w-md p-10 mx-4">
    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-pink-500 bg-clip-text text-transparent">
        AI创作动态漫
      </h1>
      <p class="text-gray-500 mt-2 text-sm">让漫画动起来</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-5">
      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">用户名</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="请输入用户名"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition-all"
          required
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">密码</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="请输入密码"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition-all"
          required
        >
      </div>

      <!-- Remember & Forgot -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center cursor-pointer">
          <input type="checkbox" class="w-4 h-4 text-purple-600 rounded border-gray-300 focus:ring-purple-500">
          <span class="ml-2 text-gray-600">记住我</span>
        </label>
        <a href="#" class="text-purple-600 hover:text-purple-700 hover:underline">忘记密码？</a>
      </div>

      <!-- Login Button -->
      <button
        type="submit"
        class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-500 text-white font-semibold rounded-xl hover:from-purple-700 hover:to-pink-600 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5"
      >
        登录
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <div class="flex-1 border-t border-gray-200"></div>
      <span class="px-4 text-sm text-gray-400">或</span>
      <div class="flex-1 border-t border-gray-200"></div>
    </div>

    <!-- Register Button -->
    <button
      type="button"
      id="registerBtn"
      class="w-full py-3 bg-white border-2 border-purple-600 text-purple-600 font-semibold rounded-xl hover:bg-purple-50 transition-all"
    >
      注册账号
    </button>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-8">
      登录即表示同意 <a href="#" class="underline">服务条款</a> 和 <a href="#" class="underline">隐私政策</a>
    </p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const registerBtn = document.getElementById('registerBtn');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      alert('登录功能演示：用户名=' + username);
    });

    registerBtn.addEventListener('click', function() {
      alert('注册功能演示');
    });
  </script>
</body>
</html>
